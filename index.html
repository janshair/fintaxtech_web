<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Fintaxtech Ltd</title>
    <style>
      :root {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        padding: 1.5rem;
        box-sizing: border-box;
        text-align: center;
      }
      .logo-wrap img {
        display: block;
        max-width: min(90vw, 480px);
        height: auto;
      }
      .email-animated {
        color: #000000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: clamp(0.95rem, 2.8vw, 1.125rem);
        font-weight: 500;
        letter-spacing: 0.03em;
        text-decoration: none;
        animation: emailReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
      }
      .email-animated:hover,
      .email-animated:focus-visible {
        text-decoration: underline;
        outline: none;
      }
      @keyframes emailReveal {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
</head>
<body>
    <div class="logo-wrap">
        <img src="./ftt_logo.png" alt="Fintaxtech">
        <a class="email-animated" href="mailto:ask@fintaxtech.co.uk">ask@fintaxtech.co.uk</a>
    </div>
</body>
</html>
